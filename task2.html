<!DOCTYPE html>
<html>
<head>
    <title>To-Do List Application</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: white;
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 2rem;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 1.5rem;
            font-size: 2rem;
        }
        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
        }
        #taskInput {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        #taskInput:focus {
            outline: none;
            border-color: #667eea;
        }
        #addBtn {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: background 0.3s;
        }
        #addBtn:hover {
            background: #5a67d8;
        }
        .error-message {
            color: #e53e3e;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #f0f0f0;
            color: #666;
            font-size: 0.9rem;
        }
        .task-list {
            list-style: none;
        }
        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: #f8f9fa;
            margin-bottom: 10px;
            border-radius: 8px;
            transition: all 0.3s;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .task-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        .task-content {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        .task-text {
            font-size: 1rem;
            color: #333;
            word-break: break-word;
            flex: 1;
        }
        .task-text.completed {
            text-decoration: line-through;
            color: #999;
        }
        .delete-btn {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.3s;
        }
        .delete-btn:hover {
            background: #c53030;
        }
        .empty-message {
            text-align: center;
            color: #999;
            padding: 2rem;
            font-style: italic;
        }
        @media (max-width: 500px) {
            body {
                padding: 1rem;
            }
            .container {
                padding: 1.5rem;
            }
            .input-section {
                flex-direction: column;
            }
            .task-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .task-content {
                width: 100%;
            }
            .delete-btn {
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>To-Do List</h1>    
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Enter a new task..." autocomplete="off">
            <button id="addBtn">Add Task</button>
        </div>
        <div class="error-message" id="errorMessage">
            Please enter a task (minimum 3 characters)
        </div>
        <div class="stats">
            <span id="totalTasks">Total: 0</span>
            <span id="completedTasks">Completed: 0</span>
            <span id="pendingTasks">Pending: 0</span>
        </div>
        <ul class="task-list" id="taskList">
            <li class="empty-message">No tasks yet. Add your first task above!</li>
        </ul>
    </div>
    <script>
        let tasks = [];
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');
        const errorMessage = document.getElementById('errorMessage');
        const totalTasksSpan = document.getElementById('totalTasks');
        const completedTasksSpan = document.getElementById('completedTasks');
        const pendingTasksSpan = document.getElementById('pendingTasks');
        function loadTasks() {
            const storedTasks = localStorage.getItem('tasks');
            if (storedTasks) {
                tasks = JSON.parse(storedTasks);
                renderTasks();
            }
        }
        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }
        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(task => task.completed).length;
            const pending = total - completed;
            
            totalTasksSpan.textContent = `Total: ${total}`;
            completedTasksSpan.textContent = `Completed: ${completed}`;
            pendingTasksSpan.textContent = `Pending: ${pending}`;
        }  
        function validateTask(taskText) {
            if (!taskText || taskText.trim() === '') {
                errorMessage.textContent = 'Please enter a task';
                errorMessage.classList.add('show');
                return false;
            }
            
            if (taskText.trim().length < 3) {
                errorMessage.textContent = 'Task must be at least 3 characters long';
                errorMessage.classList.add('show');
                return false;
            }
            errorMessage.classList.remove('show');
            return true;
        }
        
        function addTask() {
            const taskText = taskInput.value;
            
            if (!validateTask(taskText)) {
                return;
            }
            
            const newTask = {
                id: Date.now(),
                text: taskText.trim(),
                completed: false,
                createdAt: new Date().toISOString()
            };
            
            tasks.push(newTask);
            saveTasks();
            taskInput.value = '';
            renderTasks();
            taskInput.focus();
        }
        
        function deleteTask(taskId) {
            tasks = tasks.filter(task => task.id !== taskId);
            saveTasks();
            renderTasks();
        }
        
        function toggleComplete(taskId) {
            const task = tasks.find(task => task.id === taskId);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
            }
        }
        
        function renderTasks() {
            taskList.innerHTML = '';
            updateStats();
            
            if (tasks.length === 0) {
                const emptyLi = document.createElement('li');
                emptyLi.className = 'empty-message';
                emptyLi.textContent = 'No tasks yet. Add your first task above!';
                taskList.appendChild(emptyLi);
                return;
            }
            
            const sortedTasks = [...tasks].sort((a, b) => {
                if (a.completed === b.completed) {
                    return b.id - a.id;
                }
                return a.completed ? 1 : -1;
            });
            
            sortedTasks.forEach(task => {
                const li = document.createElement('li');
                li.className = 'task-item';
                
                const taskContent = document.createElement('div');
                taskContent.className = 'task-content';
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'task-checkbox';
                checkbox.checked = task.completed;
                checkbox.addEventListener('change', () => toggleComplete(task.id));
                
                const taskText = document.createElement('span');
                taskText.className = 'task-text';
                if (task.completed) {
                    taskText.classList.add('completed');
                }
                taskText.textContent = task.text;
                
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.textContent = 'Delete';
                deleteBtn.addEventListener('click', () => deleteTask(task.id));
                
                taskContent.appendChild(checkbox);
                taskContent.appendChild(taskText);
                li.appendChild(taskContent);
                li.appendChild(deleteBtn);
                
                taskList.appendChild(li);
            });
        }
        
        addBtn.addEventListener('click', addTask); 
        taskInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTask();
            }
        });
        loadTasks();
    </script>
</body>
</html>
